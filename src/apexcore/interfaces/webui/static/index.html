<!doctype html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="utf-8">
<title>ApexCore</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="64x64" href="/static/assets/favicon-64.png">
<meta name="viewport" content="width=1280">
<script>
  // Anti-FOUC: подхватываем сохранённую тему ДО загрузки CSS, чтобы
  // светлая тема не успела моргнуть как тёмная. Сам же модуль
  // js/theme.js загружается позже (через app.js) и повторно вызывает
  // initTheme — без вреда, тот же эффект.
  (function () {
    try {
      var t = localStorage.getItem('apexcore-theme');
      if (t === 'light' || t === 'dark') {
        document.documentElement.setAttribute('data-theme', t);
      }
    } catch (e) { /* ignore */ }
  })();
</script>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/chrome.css">
<link rel="stylesheet" href="/static/css/components.css">
<link rel="stylesheet" href="/static/css/screens.css">
</head>
<body>
  <header class="topbar"></header>
  <nav class="sidebar"></nav>
  <main class="content"></main>
  <footer class="statusbar"></footer>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
