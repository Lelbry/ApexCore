# apexcore CPU ranking dataset
#
# Используется блоком "Положение среди популярных CPU" в карточке
# результата теста Single-Core / Multi-Core (см.
# render.render_single_multi_result и application.cpu_ranking).
#
# Числа single_score / multi_score безымянны: внутренние очки,
# пропорциональные типичным результатам Cinebench R23 1T / nT по
# публичным обзорам (Tom's Hardware, AnandTech archive, GamersNexus,
# Notebookcheck). Используются ТОЛЬКО для рейтинговой позиции
# (top-N%) — абсолютные числа в UI не показываются.
#
# Как пополнять: см. README_cpu_ranking.md рядом с этим файлом.

schema_id: "cpu-ranking-v1"
version: "0.2.0"
created_at: "2026-05-15"
notes: >
  Срез ~40 популярных десктопных CPU 2019-2024 годов (Intel 9-14gen
  и AMD Ryzen 3000-7000). Включены K, non-K и locked (i3/i5-x400)
  варианты. Серверные (Xeon, EPYC), HEDT (Threadripper), мобильные
  H/HX и Apple Silicon намеренно не включены — рейтинг был бы
  некорректным.

