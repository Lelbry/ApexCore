# apexcore empirical reference values
#
# Используется только для тех micro-тестов, у которых нет аналитического
# Roofline-предела (см. docs/scoring_v2.md §4.1).
#
# Каждое значение помечено флагом provisional. Provisional-значения дают
# OverallScore.provisional = True — балл считается, но публиковать его как
# окончательный нельзя до набора данных и финализации.
#
# Как финализировать:
#   1. Запустить `bench micro run --preset accurate` несколько раз на
#      reference-машине (≥10 прогонов).
#   2. Вычислить median по результатам.
#   3. Заменить значения provisional на final, поднять n_runs_collected.
#   4. Снять флаг provisional.
#
# Conservative placeholder значения подобраны как медиана для типового
# десктопа Intel Core i5/i7 12-го поколения (Alder Lake) с DDR4-3200 / DDR5-4800,
# на основе литературных оценок и ориентировочных бенчмарков.

reference_id: "empirical-v0-provisional"
version: "0.1.0"
created_at: "2026-05-06"
machine_description: "Intel Core i5/i7 12th gen reference placeholder"

values:
  # Julia fractal (single-precision).
  # Placeholder: 80 FPS на 512x512 max_iter=256 — типично для современного i7.
  julia_sp:
    workload_id: "julia_sp"
    value: 80.0
    unit: "FPS"
    source: "empirical_proxy"
    provisional: true
    n_runs_collected: 0
    notes: "Placeholder; finalize after collecting 10+ runs on reference machine."

  # Mandelbrot fractal (double-precision).
  # Placeholder: 40 FPS — Mandelbrot обычно ~2x медленнее Julia из-за DP arithmetic.
  mandelbrot_dp:
    workload_id: "mandelbrot_dp"
    value: 40.0
    unit: "FPS"
    source: "empirical_proxy"
    provisional: true
    n_runs_collected: 0
    notes: "Placeholder; finalize after collecting 10+ runs on reference machine."

  # AES-256-CBC fallback (для CPU без AES-NI).
  # Placeholder: 200 MB/s — типичная скорость software AES на современном x86.
  aes_256:
    workload_id: "aes_256"
    value: 200.0
    unit: "MB/s"
    source: "empirical_proxy"
    provisional: true
    n_runs_collected: 0
    notes: "Fallback for CPUs without AES-NI; finalize after data collection."

  # SHA-1 fallback (для CPU без SHA-NI).
  # Placeholder: 500 MB/s — software SHA-1 на современном x86.
  sha1:
    workload_id: "sha1"
    value: 500.0
    unit: "MB/s"
    source: "empirical_proxy"
    provisional: true
    n_runs_collected: 0
    notes: "Fallback for CPUs without SHA-NI; finalize after data collection."
